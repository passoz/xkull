# Calorias e macros por fase × tipo de dia
# Hermes consulta este arquivo para montar os macros_hoje do estado.json
# Scripts de cardápio usam para gerar sugestões dentro da meta

# Distribuição de carbo: 60% em volta do treino (pré+intra+pós)
# Gordura: 0,8-1,0 g/kg
# Proteína: piso de 1,6 g/kg de massa magra estimada (65 kg = 104 g), alvo 2,0 g/kg = 130 g
# Mas mantemos 160-180 g para preservar saciedade e massa magra em déficit

fases:
  "0-reset":
    descricao: "Manutenção — foco em tracking, sem déficit"
    treino:
      kcal: 2300
      proteina_g: 160
      carbo_g: 250
      gordura_g: 75
    descanso:
      kcal: 2200
      proteina_g: 160
      carbo_g: 230
      gordura_g: 70

  "1-recorte-a":
    descricao: "Déficit agressivo ~750 kcal"
    treino:
      kcal: 1800
      proteina_g: 180
      carbo_g: 165
      gordura_g: 60
    descanso:
      kcal: 1650
      proteina_g: 170
      carbo_g: 135
      gordura_g: 55

  "2-consolidacao":
    descricao: "Reverse diet — sobe 100 kcal/sem até TDEE"
    semana_1:
      treino:  { kcal: 1900, proteina_g: 175, carbo_g: 180, gordura_g: 62 }
      descanso: { kcal: 1800, proteina_g: 170, carbo_g: 165, gordura_g: 60 }
    semana_2:
      treino:  { kcal: 2100, proteina_g: 170, carbo_g: 200, gordura_g: 70 }
      descanso: { kcal: 2000, proteina_g: 170, carbo_g: 180, gordura_g: 65 }
    semana_3:
      treino:  { kcal: 2300, proteina_g: 165, carbo_g: 230, gordura_g: 75 }
      descanso: { kcal: 2200, proteina_g: 165, carbo_g: 215, gordura_g: 72 }
    semana_4:
      treino:  { kcal: 2400, proteina_g: 160, carbo_g: 250, gordura_g: 75 }
      descanso: { kcal: 2300, proteina_g: 160, carbo_g: 235, gordura_g: 73 }

  "3-recorte-b":
    descricao: "Déficit moderado ~500 kcal"
    treino:
      kcal: 1950
      proteina_g: 170
      carbo_g: 175
      gordura_g: 65
    descanso:
      kcal: 1800
      proteina_g: 165
      carbo_g: 155
      gordura_g: 60

  "4-manutencao":
    descricao: "TDEE"
    treino:
      kcal: 2500
      proteina_g: 160
      carbo_g: 280
      gordura_g: 75
    descanso:
      kcal: 2400
      proteina_g: 160
      carbo_g: 260
      gordura_g: 75

# Piso de segurança
piso:
  kcal_minimo_homens: 1500
  proteina_minima_g: 130

# Distribuição das refeições (% das kcal totais)
distribuicao_refeicoes:
  cafe: 0.22
  almoco: 0.32
  lanche: 0.14
  jantar: 0.28
  extras: 0.04

# Distribuição de macros por refeição
distribuicao_macros:
  cafe:
    proteina_pct: 0.22
    carbo_pct: 0.20
    gordura_pct: 0.15
  almoco:
    proteina_pct: 0.28
    carbo_pct: 0.45
    gordura_pct: 0.15
  lanche:
    proteina_pct: 0.18
    carbo_pct: 0.10
    gordura_pct: 0.20
  jantar:
    proteina_pct: 0.32
    carbo_pct: 0.25
    gordura_pct: 0.50

# Calorias e macros por fase × tipo de dia
# Atualizado em 2026-06-08 após revisão crítica do plano.
#
# Bio operacional:
#   - 48 anos, 173 cm, ~100 kg
#   - TMB estimada: 1.850 kcal
#   - TDEE estimado: 2.400–2.550 kcal (validar por evolução real)
#   - IAM set/2024, 3 stents, PA controlada, liberado cardio
#
# Nota importante:
#   - 1.800 kcal NÃO é manutenção; é corte agressivo/controlado.
#   - Proteína deve operar por faixa: mínimo, alvo, excelente.
#   - As calorias por macro abaixo foram ajustadas para fechar matematicamente.

fases:
  "0-reset":
    descricao: "Corte inicial controlado — valida aderência sem medidas extremas"
    treino:
      kcal: 1800
      proteina_g: 150
      carbo_g: 165
      gordura_g: 60
    descanso:
      kcal: 1700
      proteina_g: 145
      carbo_g: 145
      gordura_g: 60

  "1-recorte-a":
    descricao: "Corte sustentado — perseguir 92 kg com média 0,5–0,8 kg/sem"
    treino:
      kcal: 1800
      proteina_g: 150
      carbo_g: 165
      gordura_g: 60
    descanso:
      kcal: 1650
      proteina_g: 145
      carbo_g: 135
      gordura_g: 59

  "2-consolidacao":
    descricao: "Consolidação curta — reduzir fadiga e estabilizar antes do segundo corte"
    semana_1:
      treino:  { kcal: 1850, proteina_g: 150, carbo_g: 175, gordura_g: 61 }
      descanso: { kcal: 1750, proteina_g: 145, carbo_g: 155, gordura_g: 61 }
    semana_2:
      treino:  { kcal: 1950, proteina_g: 150, carbo_g: 195, gordura_g: 63 }
      descanso: { kcal: 1850, proteina_g: 145, carbo_g: 175, gordura_g: 63 }
    semana_3:
      treino:  { kcal: 2050, proteina_g: 150, carbo_g: 215, gordura_g: 66 }
      descanso: { kcal: 1950, proteina_g: 145, carbo_g: 195, gordura_g: 66 }
    semana_4:
      treino:  { kcal: 2100, proteina_g: 150, carbo_g: 225, gordura_g: 67 }
      descanso: { kcal: 2000, proteina_g: 145, carbo_g: 205, gordura_g: 67 }

  "3-recorte-b":
    descricao: "Segundo corte — perseguir 78 kg até 31/12 se o ritmo permitir"
    treino:
      kcal: 1850
      proteina_g: 150
      carbo_g: 175
      gordura_g: 61
    descanso:
      kcal: 1750
      proteina_g: 145
      carbo_g: 155
      gordura_g: 61

  "4-manutencao":
    descricao: "Manutenção — definir por média real após atingir meta"
    treino:
      kcal: 2300
      proteina_g: 145
      carbo_g: 255
      gordura_g: 75
    descanso:
      kcal: 2200
      proteina_g: 145
      carbo_g: 230
      gordura_g: 75

# Piso e faixas de segurança
piso:
  kcal_minimo_homens: 1500
  proteina_minima_g: 130
  carbo_minimo_g: 80
  gordura_minima_pct_kcal: 20

proteina:
  minimo_aceitavel_g: 130
  alvo_realista_g: 145
  excelente_g: 160

# Distribuição das 4 refeições (% das kcal totais)
distribuicao_refeicoes:
  cafe: 0.20
  almoco: 0.38
  lanche: 0.14
  jantar: 0.28

# Distribuição de macros por refeição — guia, não trava rígida
distribuicao_macros:
  cafe:
    proteina_pct: 0.20
    carbo_pct: 0.20
    gordura_pct: 0.20
  almoco:
    proteina_pct: 0.35
    carbo_pct: 0.45
    gordura_pct: 0.30
  lanche:
    proteina_pct: 0.20
    carbo_pct: 0.10
    gordura_pct: 0.15
  jantar:
    proteina_pct: 0.25
    carbo_pct: 0.25
    gordura_pct: 0.35

meta_ambiciosa:
  peso_final_kg: 78
  data: "2026-12-31"
  ritmo_necessario_kg_sem: 0.75
  classificacao: "possivel_no_papel_mas_agressiva"
  politica: "perseguir sem medidas extremas; revisar por média móvel"
